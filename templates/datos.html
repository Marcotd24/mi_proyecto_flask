{% extends "base.html" %}

{% block content %}

<h2>Productos Guardados</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Precio</th>
</tr>

{% for producto in productos %}

<tr>
    <td>{{ producto.id }}</td>
    <td>{{ producto.nombre }}</td>
    <td>{{ producto.precio }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/producto">Agregar otro producto</a>

{% endblock %}
