<!DOCTYPE html>
<html>
<head>
    <title>Usuarios</title>
</head>
<body>

    <h2>Lista de Usuarios</h2>

    <a href="/logout">Cerrar sesión</a>

    <br><br>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
        </tr>

        {% for u in usuarios %}
        <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
